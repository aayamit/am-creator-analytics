name: am_creator_analytics

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - am_creator_network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_DB_NAME: ${APP_DB_NAME:-am_creator_analytics}
      APP_DB_USER: ${APP_DB_USER:-am_creator_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-change-me-app-db-password}
      NANGO_DB_NAME: ${NANGO_DB_NAME:-nango}
      NANGO_DB_USER: ${NANGO_DB_USER:-nango}
      NANGO_DB_PASSWORD: ${NANGO_DB_PASSWORD:-change-me-nango-db-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - am_creator_network

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - am_creator_network

  mongo:
    image: mongo:latest
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-opensign}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me-opensign-mongo-password}
      MONGO_INITDB_DATABASE: ${OPENSIGN_MONGO_DATABASE:-opensign}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "${MONGO_INITDB_ROOT_USERNAME:-opensign}",
          "--password",
          "${MONGO_INITDB_ROOT_PASSWORD:-change-me-opensign-mongo-password}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - am_creator_network

  opensign:
    image: opensign/opensign:main
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      MONGODB_URI: ${OPENSIGN_MONGODB_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-opensign}:${MONGO_INITDB_ROOT_PASSWORD:-change-me-opensign-mongo-password}@mongo:27017/${OPENSIGN_MONGO_DATABASE:-opensign}?authSource=admin}
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - am_creator_network

  nango:
    image: nangohq/nango-server:hosted
    platform: linux/amd64
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NANGO_ENVIRONMENT: ${NANGO_ENVIRONMENT:-production}
      NANGO_DB_HOST: postgres
      NANGO_DB_PORT: 5432
      NANGO_DB_USER: ${NANGO_DB_USER:-nango}
      NANGO_DB_PASSWORD: ${NANGO_DB_PASSWORD:-change-me-nango-db-password}
      NANGO_DB_NAME: ${NANGO_DB_NAME:-nango}
      NANGO_REDIS_HOST: redis
      NANGO_REDIS_PORT: 6379
    ports:
      - "127.0.0.1:3005:3000"
      - "127.0.0.1:3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - am_creator_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
      opensign:
        condition: service_started
      nango:
        condition: service_started
    networks:
      - am_creator_network

networks:
  am_creator_network:
    name: am_creator_network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  nginx_logs:
