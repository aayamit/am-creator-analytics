services:
  # =================== AM Creator Analytics (Next.js) ===================
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: am-creator-app
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # =================== PostgreSQL ===================
  postgres:
    image: postgres:16-alpine
    container_name: am-creator-postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - /Volumes/DA/am-creator-analytics/volumes/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      app-network:
        aliases:
          - nango-db

  # =================== OpenSign Client ===================
  opensign-client:
    image: opensign/opensign:main
    container_name: opensign-client
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - app-network

  # =================== MongoDB (for OpenSign) ===================
  mongo:
    image: mongo:latest
    container_name: opensign-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: opensign
      MONGO_INITDB_ROOT_PASSWORD: opensign123
    volumes:
      - /Volumes/DA/am-creator-analytics/volumes/mongo:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # =================== Nginx Reverse Proxy ===================
  # =================== Redis (for Nango) ===================
  redis:
    image: redis:alpine
    container_name: am-creator-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - /Volumes/DA/am-creator-analytics/volumes/redis:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      app-network:
        aliases:
          - nango-redis

  # =================== Nango (OAuth Integration) ===================
  nango:
    image: nangohq/nango-server:hosted
    platform: linux/amd64
    container_name: am-creator-nango
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3000"   # Nango API (listening on 3000 inside)
      - "127.0.0.1:3006:3006"   # Nango UI (listening on 3006 inside)
    env_file:
      - .env.prod
    environment:
      NANGO_ENVIRONMENT: production
      NANGO_DB_HOST: postgres
      NANGO_DB_PORT: 5432
      NANGO_DB_USER: nango
      NANGO_DB_PASSWORD: nango
      NANGO_DB_NAME: nango
      NANGO_REDIS_HOST: nango-redis
      NANGO_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: am-creator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
      - opensign-client
    networks:
      - app-network

networks:
  app-network:
    driver: bridge